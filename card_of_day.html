                    date: date,
                    name: card.name,
                    number: card.number,
                    suit: card.suit
                });

                displayResult(card, date);
                loading.classList.remove('show');
                getBtn.disabled = false;
                updateHistory();
            }, 1000);
        }

        function displayResult(card, date) {
            const resultArea = document.getElementById('resultArea');
            const cardEl = document.getElementById('resultCard');

            // Форматируем дату
            const dateObj = new Date(date + 'T00:00:00');
            const formattedDate = dateObj.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            // Проверяем, есть ли картинка
            const imgSrc = card.img || '';

            cardEl.innerHTML = `
                <div>
                    ${imgSrc ? `<img class="card-img" src="${imgSrc}" alt="${card.name}" onerror="this.style.display='none'">` : `<div class="card-img-placeholder">🃏</div>`}
                </div>
                <div class="card-info">
                    <div class="card-number">${typeof card.number === 'number' ? '№ ' + card.number : card.number} · ${card.suit}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-keywords">${card.keywords}</div>
                    <div class="card-meaning">
                        <span class="label">📖 Значение карты</span>
                        ${card.meaning}
                    </div>
                    <div class="card-advice">
                        <span class="label">✅ Ваш совет</span>
                        ${card.advice}
                    </div>
                    <div class="card-date">📅 ${formattedDate}</div>
                </div>
            `;

            resultArea.classList.add('show');
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function refreshCard() {
            if (!currentDate) {
                alert('Сначала получите карту дня.');
                return;
            }
            getCardOfDay();
        }

        function clearAll() {
            history = [];
            currentCard = null;
            currentDate = null;
            updateHistory();
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('loading').classList.remove('show');
            document.getElementById('getBtn').disabled = false;
            document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        }

        function updateHistory() {
            const historyArea = document.getElementById('historyArea');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyArea.style.display = 'none';
                return;
            }

            historyArea.style.display = 'block';
            historyList.innerHTML = '';

            const reversed = [...history].reverse().slice(0, 7);

            reversed.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="h-date">${item.date}</span>
                    <span class="h-name">${item.name}</span>
                    <span class="h-suit">${item.suit}</span>
                `;
                historyList.appendChild(div);
            });
        }

        // ============================================================
        // ПОДЕЛИТЬСЯ
        // ============================================================

        function shareResult(platform) {
            if (!currentCard) {
                alert('Сначала получите карту дня.');
                return;
            }

            const text =
                `🃏 Моя карта дня: ${currentCard.name}\n📖 ${currentCard.meaning}\n✅ Совет: ${currentCard.advice}\n\n✨ RelationMap | 7 шагов к ясности`;

            const url = encodeURIComponent('https://relationmap.github.io/arkany/card_of_day.html');

            switch (platform) {
                case 'vk':
                    window.open(`https://vk.com/share.php?url=${url}&title=Карта дня&description=${encodeURIComponent(text)}`,
                        '_blank');
                    break;
                case 'tg':
                    window.open(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(text)}`, '_blank');
                    break;
                case 'copy':
                    navigator.clipboard.writeText(text + '\n\nУзнайте свою карту дня: ' + decodeURIComponent(url)).then(() => {
                        alert('✅ Текст скопирован в буфер обмена!');
                    }).catch(() => {
                        prompt('Скопируйте текст:', text);
                    });
                    break;
                default:
                    alert('Выберите способ публикации.');
            }
        }

        // ============================================================
        // КЛАВИАТУРА
        // ============================================================

        document.getElementById('dateInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                getCardOfDay();
            }
        });

        console.log('🃏 Карта дня загружена!');
        console.log('📅 Введите дату и получите совет от Вселенной.');
        console.log('🖼️ Картинки загружаются из папки images/');
    </script>

</body>
</html>
