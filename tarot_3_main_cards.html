        // ============================================================
        // РАСЧЁТ КАРТ
        // ============================================================

        function reduceToArcana(num) {
            while (num > 22) {
                num = String(num).split('').reduce((a, b) => a + parseInt(b), 0);
            }
            return num === 22 ? 0 : num;
        }

        function calculateCards() {
            const day = parseInt(document.getElementById('birthDay').value);
            const month = parseInt(document.getElementById('birthMonth').value);
            const year = parseInt(document.getElementById('birthYear').value);

            if (!day || !month || !year || day < 1 || day > 31 || month < 1 || month > 12 || year < 1900 || year > 2099) {
                alert('Пожалуйста, введите корректную дату рождения');
                return;
            }

            // === 1. АРКАН ДНЯ РОЖДЕНИЯ ===
            const sumBirth = String(day + month + year).split('').reduce((a, b) => a + parseInt(b), 0);
            const birthArcanaNumber = reduceToArcana(sumBirth);

            // === 2. КАРТА ГОДА ===
            const currentYear = 2026;
            const sumYear = day + month + currentYear;
            const yearArcanaNumber = reduceToArcana(sumYear);

            // === 3. КАРТА МЕСЯЦА ===
            const currentMonth = new Date().getMonth() + 1;
            const sumMonth = day + month + currentMonth + currentYear;
            const monthArcanaNumber = reduceToArcana(sumMonth);

            // === ОТОБРАЖЕНИЕ ===
            const resultBlock = document.getElementById('resultBlock');
            resultBlock.classList.add('show');

            const grid = document.getElementById('resultGrid');
            grid.innerHTML = '';

            grid.appendChild(createResultCard(
                'Аркан дня рождения',
                'Ваш врождённый путь, характер, таланты — вся жизнь',
                birthArcanaNumber
            ));

            grid.appendChild(createResultCard(
                'Карта года',
                'Главная тема этого года — 12 месяцев',
                yearArcanaNumber
            ));

            grid.appendChild(createResultCard(
                'Карта месяца',
                'Что вы проживаете прямо сейчас — 30 дней',
                monthArcanaNumber
            ));

            highlightTableRows([birthArcanaNumber, yearArcanaNumber, monthArcanaNumber]);

            setTimeout(() => {
                resultBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        function createResultCard(title, subtitle, arcanaNumber) {
            const arcana = arcanaData.find(a => a.number === arcanaNumber);

            const div = document.createElement('div');
            div.className = 'result-card';
            div.innerHTML = `
                <div class="rc-badge">${title}</div>
                <div class="rc-sub">${subtitle}</div>
                <img class="rc-image" src="${arcana.img}" alt="${arcana.name}" onerror="this.style.display='none'">
                <div class="rc-number">${arcanaNumber === 0 ? '0' : arcanaNumber}</div>
                <div class="rc-name">${arcana.name}</div>
                <div class="rc-keywords">${arcana.keywords}</div>
                <div class="rc-desc">
                    <div><span class="label">📌 ОБЩЕЕ:</span> ${arcana.general}</div>
                    <div><span class="label">❤️ В ОТНОШЕНИЯХ:</span> ${arcana.relationships}</div>
                    <div><span class="label">💼 В РАБОТЕ/ДЕНЬГАХ:</span> ${arcana.work}</div>
                    <div><span class="label">⚠️ ПРЕДУПРЕЖДЕНИЕ:</span> ${arcana.warning}</div>
                    <div><span class="label">✅ ДЕЙСТВИЕ:</span> ${arcana.action}</div>
                </div>
            `;
            return div;
        }

        // ============================================================
        // СБРОС
        // ============================================================

        function resetAll() {
            document.getElementById('birthDay').value = '';
            document.getElementById('birthMonth').value = '';
            document.getElementById('birthYear').value = '';
            document.getElementById('resultBlock').classList.remove('show');
            document.getElementById('resultGrid').innerHTML = '';
            document.querySelectorAll('#arcanaTableBody tr').forEach(row => {
                row.classList.remove('highlight-row');
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================================
        // ТАБЛИЦА
        // ============================================================

        function renderTable(highlightNumbers) {
            const tbody = document.getElementById('arcanaTableBody');
            tbody.innerHTML = '';
            const highlights = highlightNumbers || [];

            arcanaData.forEach(a => {
                const tr = document.createElement('tr');
                if (highlights.includes(a.number)) {
                    tr.className = 'highlight-row';
                }
                tr.innerHTML = `
                    <td>${a.number === 0 ? '0' : a.number}</td>
                    <td><strong>${a.name}</strong></td>
                    <td>${a.keywords}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function highlightTableRows(numbers) {
            const rows = document.querySelectorAll('#arcanaTableBody tr');
            rows.forEach(row => {
                row.classList.remove('highlight-row');
                const td = row.querySelector('td');
                if (td) {
                    const rowNum = parseInt(td.textContent);
                    if (numbers.includes(rowNum) || (rowNum === 0 && numbers.includes(0))) {
                        row.classList.add('highlight-row');
                    }
                }
            });
        }

        // ============================================================
        // АВТОЗАПУСК
        // ============================================================

        renderTable([]);
        setTimeout(calculateCards, 500);

        console.log('✅ Калькулятор "3 главные карты" загружен!');
        console.log('🃏 Аркан дня рождения, Карта года, Карта месяца');
    </script>
