            color: #ffd700;
            font-weight: 700;
        }
        .header p {
            color: #c9b0e6;
            font-size: 0.95em;
            margin-top: 4px;
        }

            border-color: #2DD4BF;
            outline: none;
            box-shadow: 0 0 30px rgba(45, 212, 191, 0.05);
        }
        .question-area textarea::placeholder {

        }

            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .btn {
            padding: 12px 35px;
            border: none;
            border-radius: 30px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

            background: linear-gradient(135deg, #2DD4BF, #1a9e8a);

        }

            transform: translateY(-2px);

        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #c9b0e6;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-secondary:hover {

        }
        .btn-danger {

            border: 1px solid rgba(231, 76, 60, 0.15);
        }
        .btn-danger:hover {

        }

            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
            }

            border: 2px solid rgba(45, 212, 191, 0.1);

                height: 28px;
                line-height: 28px;
                font-size: 0.6em;
            }

    </style>
</head>

            const askBtn = document.getElementById('askBtn');

            loading.classList.add('show');
            resultArea.classList.remove('show');
            askBtn.disabled = true;

            // Имитация задержки (для эффекта "размышления")
            setTimeout(() => {
                // Выбираем случайный аркан
                const randomIndex = Math.floor(Math.random() * arcanaData.length);
                const arcana = arcanaData[randomIndex];

                // Сохраняем в историю
                history.push({
                    question: question,
                    arcana: arcana.name,
                    number: arcana.number,
                    timestamp: new Date().toLocaleTimeString()
                });

                // Отображаем результат
                displayResult(arcana, question);
                loading.classList.remove('show');
                askBtn.disabled = false;

                // Показываем историю
                updateHistory();

            }, 1200);
        }

        function displayResult(arcana, question) {
            const resultArea = document.getElementById('resultArea');
            const card = document.getElementById('resultCard');

            card.innerHTML = `
                <img class="arcana-img" src="${arcana.img}" alt="${arcana.name}" onerror="this.style.display='none'">
                <div class="arcana-info">
                    <div class="arcana-number">№ ${arcana.number === 0 ? '0' : arcana.number} · ${arcana.keywords}</div>
                    <div class="arcana-name">${arcana.name}</div>
                    <div class="arcana-message">
                        <span class="label">📖 Ответ Арканов</span>
                        ${arcana.message}
                    </div>
                    <div class="arcana-advice">
                        <span class="label">✅ Ваш совет</span>
                        ${arcana.advice}
                    </div>
                    <div style="font-size:0.75em;color:rgba(255,255,255,0.2);margin-top:4px;">
                        Ваш вопрос: «${question.substring(0, 60)}${question.length > 60 ? '...' : ''}»
                    </div>
                </div>
            `;

            resultArea.classList.add('show');
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function updateHistory() {
            const historyArea = document.getElementById('historyArea');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyArea.style.display = 'none';
                return;
            }

            historyArea.style.display = 'block';
            historyList.innerHTML = '';

            // Показываем последние 10 запросов (сначала новые)
            const reversed = [...history].reverse().slice(0, 10);

            reversed.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="h-question">${item.question}</span>
                    <span class="h-answer">${item.arcana}</span>
                `;
                historyList.appendChild(div);
            });
        }

        function clearAll() {
            // Очищаем историю
            history = [];
            updateHistory();

            // Очищаем вопрос
            document.getElementById('questionInput').value = '';

            // Скрываем результат
            document.getElementById('resultArea').classList.remove('show');

            // Убираем загрузку
            document.getElementById('loading').classList.remove('show');

            // Включаем кнопку
            document.getElementById('askBtn').disabled = false;
        }

        // ============================================================
        // КЛАВИАТУРНЫЙ ВВОД (Enter для отправки)
        // ============================================================

        document.getElementById('questionInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                askOracle();
            }
        });

        // Подсказка для пользователя
        console.log('🃏 Оракул Старших Арканов загружен!');
        console.log('💡 Напишите вопрос и нажмите Ctrl+Enter для быстрого ответа.');
        console.log('📜 История сохраняется в сессии.');
    </script>

</body>
</html>
